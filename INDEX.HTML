<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marmitex na Hora</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f2f2f2;
}

#fechadoTela {
  display: none;
  position: fixed;
  z-index: 9999;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #000000, #333333);
  color: white;
  text-align: center;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

header {
  background: linear-gradient(135deg, #ff6600, #ff3300);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.botao {
  background: #25D366;
  color: white;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  display: block;
  margin-top: 10px;
  cursor: pointer;
}

.item {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.total {
  font-weight: bold;
  margin-top: 15px;
}
</style>
</head>

<body>

<div id="fechadoTela">
  <h1>🚫 OPS, no momento estamos fechados</h1>
  <p>Tente novamente mais tarde!</p>
</div>

<header>
  <h2>Marmitex na Hora 🍛</h2>
</header>

<div class="container">

  <div class="card">
    <h3>Seus dados</h3>
    <input type="text" id="nome" placeholder="Seu nome">
    <textarea id="endereco" placeholder="Seu endereço completo"></textarea>
  </div>

  <div class="card">
    <h3>Escolha sua marmita</h3>

    <div class="item">
      <span>Marmita Pequena - R$ 15</span>
      <button onclick="add('Marmita Pequena', 15)">+</button>
    </div>

    <div class="item">
      <span>Marmita Média - R$ 18</span>
      <button onclick="add('Marmita Média', 18)">+</button>
    </div>

    <div class="item">
      <span>Marmita Grande - R$ 22</span>
      <button onclick="add('Marmita Grande', 22)">+</button>
    </div>

  </div>

  <div class="card">
    <h3>Forma de pagamento</h3>
    <select id="pagamento">
      <option value="">Selecione</option>
      <option value="Pix">Pix</option>
      <option value="Dinheiro">Dinheiro</option>
      <option value="Cartão">Cartão</option>
    </select>
  </div>

  <div class="card">
    <h3>🛒 Carrinho</h3>
    <div id="carrinho"></div>
    <div id="total">Total: R$ 8</div>

    <div class="botao" onclick="enviarPedido()">
      Finalizar Pedido
    </div>
  </div>

</div>

<script>
let carrinho = [];
let entrega = 8;

// HORÁRIO (TELA)
function verificarHorario() {
  let hora = new Date().getHours();
  if (!(hora >= 10 && hora < 15)) {
    document.getElementById("fechadoTela").style.display = "flex";
  }
}
verificarHorario();

// LIMITE DE ITENS
function add(nome, preco) {
  if (carrinho.length >= 10) {
    alert("Limite de itens atingido");
    return;
  }

  carrinho.push({nome, preco});
  atualizar();
}

function atualizar() {
  let html = "";
  let total = 0;

  carrinho.forEach(item => {
    html += `<div>${item.nome} - R$ ${item.preco}</div>`;
    total += item.preco;
  });

  document.getElementById("carrinho").innerHTML = html;
  document.getElementById("total").innerText = "Total: R$ " + (total + entrega);
}

// ENVIO COMPLETO
function enviarPedido() {
  let nome = document.getElementById("nome").value;
  let endereco = document.getElementById("endereco").value;
  let pagamento = document.getElementById("pagamento").value;

  // BLOQUEIO HORÁRIO
  let hora = new Date().getHours();
  if (!(hora >= 10 && hora < 15)) {
    alert("Estamos fechados");
    return;
  }

  // VALIDAÇÕES
  if (carrinho.length === 0) {
    alert("Adicione pelo menos um item");
    return;
  }

  if (nome.length < 3) {
    alert("Nome inválido");
    return;
  }

  if (endereco.length < 5) {
    alert("Endereço inválido");
    return;
  }

  if (!pagamento) {
    alert("Escolha a forma de pagamento");
    return;
  }

  // CONFIRMAÇÃO
  let confirmar = confirm("Confirmar pedido?");
  if (!confirmar) return;

  // MONTAR PEDIDO
  let texto = `🍛 Pedido%0A%0A`;
  texto += `👤 Nome: ${nome}%0A`;
  texto += `📍 Endereço: ${endereco}%0A%0A`;
  texto += `🛒 Itens:%0A`;

  let total = 0;

  carrinho.forEach(item => {
    texto += `- ${item.nome}%0A`;
    total += item.preco;
  });

  // TEMPO ALEATÓRIO
  let tempoMin = Math.floor(Math.random() * (50 - 30 + 1)) + 30;

  texto += `%0ATotal: R$ ${total + entrega}%0A`;
  texto += `💳 Pagamento: ${pagamento}%0A`;
  texto += `⏱️ Tempo estimado: ${tempoMin} minutos`;

  window.open(`https://wa.me/5599984800650?text=${texto}`);
}
</script>

</body>
</html>
